# main 브랜치에 PUSH 되면 자동으로 x86_64 도커 이미지를
# 빌드해서 DockerHub 에 올리는 CI/CD 워크 플로우
name: Build and Push momo-ai Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            frozenahri302/momo-ai-service:latest
            frozenahri302/momo-ai-service:${{ github.sha }}

      - name: EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull frozenahri302/momo-ai-service:latest
            docker stop momo-ai || true
            docker rm momo-ai || true
            docker run -d --name momo-ai \
              -p 8001:8001 \
              -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              -e CHROMA_HOST=localhost \
              -e CHROMA_PORT=8000 \
              -v /home/ubuntu/momo-chroma-data:/app/chroma \
              --entrypoint sh \
              frozenahri302/momo-ai-service:latest \
              -c "chroma run --host 0.0.0.0 --port 8000 & sleep 3 && uvicorn app.main:app --host 0.0.0.0 --port 8001"