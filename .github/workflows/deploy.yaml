# main 브랜치에 PUSH 되면 자동으로 x86_64 도커 이미지를
# 빌드해서 DockerHub 에 올리는 CI/CD 워크 플로우
name: Build and Push momo-ai Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            frozenahri302/momo-ai-service:latest
            frozenahri302/momo-ai-service:${{ github.sha }}