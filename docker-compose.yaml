services:
  # 공식 이미지 그대로, chroma_data 볼륨으로 영속화
  chroma:
    image: chromadb/chroma
    container_name: momo-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
  
  # 방금 만든 Dockerfile 로 빌드, 8001 포트 노출
  momo-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: momo-ai
    ports:
      - "8001:8001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    depends_on:
      - chroma

volumes:
  chroma_data: